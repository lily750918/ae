<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AE 监控系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- 头部 -->
    <header class="header">
        <div class="header-left">
            <h1>🚀 AE 自动交易系统 v2.0</h1>
            <!-- 第一行：主要信息 -->
            <div class="status-bar">
                <span class="status-item">账户总值: $<span id="total-balance">0.00</span></span>
                <span class="status-item">持仓: <span id="positions-count">0</span></span>
                <span class="status-item">今日建仓: <span id="today-entries">0</span></span>
                <span class="status-item status-indicator">
                    <span id="running-status" class="status-dot"></span>
                    <span id="running-text">已停止</span>
                </span>
                <span class="status-item status-indicator">
                    <span id="exchange-status-dot" class="status-dot"></span>
                    <span id="exchange-status-text">交易所 —</span>
                </span>
            </div>
            <!-- 第二行：盈亏信息 -->
            <div class="status-bar status-bar-secondary">
                <span class="status-item">可用余额: $<span id="available-balance">0.00</span></span>
                <span class="status-item">未实现盈亏: <span id="unrealized-pnl" class="pnl-value">$0.00</span></span>
                <span class="status-item">今日盈亏: <span id="daily-pnl" class="pnl-value">$0.00</span></span>
            </div>
        </div>
        <div class="header-right">
            <button class="btn btn-success" id="btn-start" onclick="startTrading()">🟢 启动交易</button>
            <button class="btn btn-danger" id="btn-stop" onclick="stopTrading()" disabled>⏹️ 停止交易</button>
            <button class="btn btn-primary" onclick="manualScan()">🔍 手动扫描</button>
            <button class="btn btn-secondary" onclick="refreshData()">🔄 刷新</button>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="main-content">
        <div class="dashboard-split">
            <div class="dashboard-col dashboard-col-left">
                <section class="section positions-panel">
                    <h2>📊 当前持仓</h2>
                    <div id="positions-container" class="positions-container">
                        <div class="empty-state">暂无持仓</div>
                    </div>
                </section>
                <section class="section logs-section">
                    <h2>📝 系统日志</h2>
                    <div class="logs-container">
                        <div id="logs-content" class="logs-content"></div>
                    </div>
                </section>
            </div>

            <div class="dashboard-col dashboard-col-right">
                <section class="section tv-chart-section tv-chart-panel">
                    <h2>📈 BTCUSDT · 日线（TradingView）</h2>
                    <div class="tv-chart-wrap">
                        <div class="tradingview-widget-container">
                            <div class="tradingview-widget-container__widget"></div>
                            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
{
  "autosize": true,
  "height": "100%",
  "width": "100%",
  "symbol": "BINANCE:BTCUSDT",
  "interval": "D",
  "timezone": "Etc/UTC",
  "theme": "dark",
  "style": "1",
  "locale": "zh_CN",
  "enable_publishing": false,
  "allow_symbol_change": true,
  "hide_top_toolbar": false,
  "hide_legend": false,
  "save_image": true,
  "calendar": false,
  "hide_volume": false,
  "support_host": "https://www.tradingview.com"
}
                            </script>
                        </div>
                    </div>
                    <p class="tv-chart-note">币安现货 BTCUSDT · 默认日 K；可在工具栏切换周期 / 品种。</p>
                </section>
            </div>
        </div>
    </main>

    <!-- 修改止盈止损弹窗 -->
    <div id="modal-tpsl" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>🔧 修改止盈止损</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>交易对:</label>
                    <div class="form-value" id="modal-symbol"></div>
                </div>
                <div class="form-group">
                    <label>入场价格:</label>
                    <div class="form-value" id="modal-entry-price"></div>
                </div>
                <div class="form-group">
                    <label>当前价格:</label>
                    <div class="form-value" id="modal-current-price"></div>
                </div>
                <div class="form-group">
                    <label>止盈价格:</label>
                    <input type="number" id="input-tp-price" class="form-input" step="0.0001" onchange="updatePercentage()">
                    <div class="form-hint" id="tp-percentage"></div>
                </div>
                <div class="form-group">
                    <label>止损价格:</label>
                    <input type="number" id="input-sl-price" class="form-input" step="0.0001" onchange="updatePercentage()">
                    <div class="form-hint" id="sl-percentage"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-success" onclick="submitTPSL()">✅ 确认修改</button>
                <button class="btn btn-secondary" onclick="closeModal()">❌ 取消</button>
            </div>
        </div>
    </div>

    <!-- 确认对话框 -->
    <div id="modal-confirm" class="modal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h3 id="confirm-title">⚠️ 确认操作</h3>
            </div>
            <div class="modal-body">
                <p id="confirm-message"></p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-danger" id="confirm-yes">确认</button>
                <button class="btn btn-secondary" onclick="closeConfirm()">取消</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
