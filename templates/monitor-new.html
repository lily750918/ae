<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AE Server 监控</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4d;
      --text: #e7edf4;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --ok: #3ecf8e;
      --warn: #f5a623;
      --danger: #ef5350;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }
    header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    header h1 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 600;
    }
    main { padding: 1.25rem; max-width: 1200px; margin: 0 auto; }
    .banner {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .banner.warn { border-color: var(--warn); background: rgba(245, 166, 35, 0.12); color: #f0c975; }
    .banner.danger { border-color: var(--danger); background: rgba(239, 83, 80, 0.12); color: #f5a8a6; }
    .banner.ok { border-color: var(--ok); background: rgba(62, 207, 142, 0.1); color: #8ee4bc; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.85rem 1rem;
    }
    .card .label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .card .value { font-size: 1.25rem; font-weight: 600; margin-top: 0.25rem; }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    button {
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      padding: 0.45rem 0.9rem;
      border-radius: 6px;
      font-size: 0.875rem;
    }
    button:hover { border-color: var(--accent); color: #fff; }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.danger { border-color: var(--danger); color: #ff8a87; }
    section {
      margin-bottom: 1.5rem;
    }
    section h2 {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--muted);
      margin: 0 0 0.5rem 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
      background: var(--surface);
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    th, td {
      padding: 0.5rem 0.65rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    th { color: var(--muted); font-weight: 500; font-size: 0.75rem; }
    tr:last-child td { border-bottom: none; }
    pre.logs {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem;
      max-height: 240px;
      overflow: auto;
      font-size: 0.75rem;
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-all;
    }
    .muted { color: var(--muted); font-size: 0.85rem; }
    time { font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <header>
    <h1>AE Server 监控</h1>
    <span class="muted">登录账号与 HTTP Basic 一致（默认 admin / admin123）</span>
  </header>
  <main>
    <div id="banner"></div>
    <div class="grid" id="stats"></div>
    <div class="actions">
      <button type="button" class="primary" id="btn-refresh">刷新状态</button>
      <button type="button" id="btn-start">启动自动交易</button>
      <button type="button" class="danger" id="btn-stop">停止自动交易</button>
      <button type="button" id="btn-scan">手动扫描</button>
      <button type="button" id="btn-logs">拉取日志摘要</button>
    </div>
    <section>
      <h2>持仓</h2>
      <div id="positions-wrap"></div>
    </section>
    <section>
      <h2>日志摘要</h2>
      <pre class="logs" id="logs">点击「拉取日志摘要」加载…</pre>
    </section>
  </main>
  <script>
    const $ = (id) => document.getElementById(id);

    async function api(path, options = {}) {
      const opts = {
        credentials: 'same-origin',
        headers: { ...options.headers },
        ...options,
      };
      if (opts.body && typeof opts.body === 'object' && !(opts.body instanceof FormData)) {
        opts.body = JSON.stringify(opts.body);
        opts.headers['Content-Type'] = opts.headers['Content-Type'] || 'application/json';
      }
      const res = await fetch(path, opts);
      const text = await res.text();
      let data = null;
      try {
        data = text ? JSON.parse(text) : null;
      } catch {
        data = { _raw: text };
      }
      return { res, data };
    }

    function showBanner(html, type = 'warn') {
      const el = $('banner');
      el.className = 'banner ' + type;
      el.innerHTML = html;
    }

    function renderStatus(data) {
      const g = $('stats');
      if (!data || data.error) {
        g.innerHTML = '<div class="card"><div class="label">错误</div><div class="value">' + (data && data.error ? data.error : '未知') + '</div></div>';
        return;
      }
      const bal = data.total_balance != null
        ? '$' + Number(data.total_balance).toFixed(2)
        : (data.balance != null ? '$' + Number(data.balance).toFixed(2) : '—');
      const cells = [
        ['API', data.api_configured ? '已配置' : '仅界面'],
        ['自动交易', data.running ? '运行中' : '已停止'],
        ['持仓数', data.positions_count ?? '—'],
        ['今日开仓', (data.today_entries ?? 0) + ' / ' + (data.max_daily_entries ?? '—')],
        ['余额', bal],
        ['时间', data.timestamp ? new Date(data.timestamp).toLocaleString() : '—'],
      ];
      g.innerHTML = cells.map(([a, b]) =>
        '<div class="card"><div class="label">' + a + '</div><div class="value">' + b + '</div></div>'
      ).join('');
      if (data.api_configured === false) {
        showBanner(
          '当前为<strong>仅界面模式</strong>：未配置币安 API 密钥。页面可浏览，仓位/资金费等接口不可用；请在环境变量或 config.ini <code>[BINANCE]</code> 填写后重启。',
          'warn'
        );
      } else {
        showBanner('已连接策略引擎；以下为实时状态（数据来自币安与本地记录）。', 'ok');
      }
    }

    async function loadStatus() {
      const { res, data } = await api('/api/status');
      if (res.status === 401) {
        showBanner('未授权：请确认浏览器已通过 Basic 认证访问本页，或重新打开页面输入账号密码。', 'danger');
        return;
      }
      renderStatus(data);
    }

    async function loadPositions() {
      const w = $('positions-wrap');
      const { res, data } = await api('/api/positions');
      if (res.status === 503 && data && data.error) {
        w.innerHTML = '<p class="muted">' + data.error + '</p>';
        return;
      }
      if (!data || !data.success) {
        w.innerHTML = '<p class="muted">' + (data && (data.error || data.message) || '加载失败') + '</p>';
        return;
      }
      if (!data.positions || !data.positions.length) {
        w.innerHTML = '<p class="muted">暂无持仓</p>';
        return;
      }
      const rows = data.positions.map((p) =>
        '<tr><td>' + (p.symbol || '') + '</td><td>' + (p.direction || '') + '</td><td>' + (p.entry_price ?? '') + '</td><td>' +
        (p.mark_price != null ? Number(p.mark_price).toFixed(6) : '') + '</td><td>' +
        (p.pnl != null ? Number(p.pnl).toFixed(2) : '') + '</td><td>' +
        (p.pnl_pct != null ? Number(p.pnl_pct).toFixed(2) + '%' : '') + '</td></tr>'
      ).join('');
      w.innerHTML =
        '<table><thead><tr><th>合约</th><th>方向</th><th>开仓价</th><th>标记价</th><th>盈亏</th><th>盈亏%</th></tr></thead><tbody>' +
        rows + '</tbody></table>';
    }

    async function loadLogs() {
      const { res, data } = await api('/api/logs');
      const pre = $('logs');
      if (res.status === 503) {
        pre.textContent = (data && data.error) || '仅界面模式下不可用';
        return;
      }
      if (data && data.success && data.logs) {
        pre.textContent = data.logs.join('\n');
      } else {
        pre.textContent = JSON.stringify(data || {}, null, 2);
      }
    }

    async function postAction(path) {
      const { res, data } = await api(path, { method: 'POST' });
      const msg = (data && (data.message || data.error)) || (res.ok ? 'OK' : res.statusText);
      alert(msg);
      await loadStatus();
      if (path !== '/api/stop_trading') {
        await loadPositions();
      }
    }

    $('btn-refresh').addEventListener('click', async () => {
      await loadStatus();
      await loadPositions();
    });
    $('btn-start').addEventListener('click', () => postAction('/api/start_trading'));
    $('btn-stop').addEventListener('click', () => postAction('/api/stop_trading'));
    $('btn-scan').addEventListener('click', () => postAction('/api/manual_scan'));
    $('btn-logs').addEventListener('click', loadLogs);

    loadStatus();
    loadPositions();
  </script>
</body>
</html>
